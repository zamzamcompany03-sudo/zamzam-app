<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سعر أونصة الذهب</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#f8f8f8;
}

.box{
    max-width:500px;
    margin:40px auto;
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.label{
    font-size:22px;
    font-weight:bold;
}

.price{
    font-size:28px;
    color:#d4af37;
    font-weight:bold;
}

.time{
    margin-top:10px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <div class="row">
        <div class="label">سعر الأونصة الآن</div>
        <div class="price" id="goldPrice">جاري التحميل...</div>
    </div>

    <div class="time" id="updateTime"></div>
</div>

<script>

const API_KEY = "goldapi-fc65777511bd803e94b4565ad9e05f52-io";

async function getGoldPrice() {
    try {

        const response = await fetch(
            "https://www.goldapi.io/api/XAU/USD",
            {
                headers: {
                    "x-access-token": API_KEY,
                    "Content-Type": "application/json"
                }
            }
        );

        if (!response.ok) {
    throw new Error("API Error: " + response.status);
}

const data = await response.json();

        document.getElementById("goldPrice").innerText =
            "$ " + Number(data.price).toFixed(2);

        document.getElementById("updateTime").innerText =
            "آخر تحديث: " + new Date().toLocaleTimeString();

    } catch (error) {

        document.getElementById("goldPrice").innerText =
            "فشل الاتصال";

    }
}

getGoldPrice();
setInterval(getGoldPrice, 5000);

</script>

</body>
</html>
